weed_detector:
  ros__parameters:
    # 3x3 homography matrix (row-major) from calib_camera.py
    # Maps pixel (u, v) to ground-plane (x_cm, y_cm)
    # Replace these with your calibration output
    homography: [0.210165551, -0.0127514972, -0.0199656242, -0.0998678008, -0.0507617835, 0.0223397112, -0.0013824149, 0.00400401464, 1.0]
    ground_plane_z: -84.0
    cluster_interval: 20
    dbscan_eps: 5.0
    dbscan_min_fraction: 0.8
