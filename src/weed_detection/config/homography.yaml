weed_detector:
  ros__parameters:
    # 3x3 homography matrix (row-major) from calib_camera.py
    # Maps pixel (u, v) to ground-plane (x_cm, y_cm)
    # Replace these with your calibration output
    ground_plane_z: -84.0
    # downward angle of camera from pointing straight (parallel to ground)
    camera_angle_deg: 35
    cluster_interval: 20
    dbscan_eps: 5.0
    dbscan_min_fraction: 0.8
