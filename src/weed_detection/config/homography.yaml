weed_detector:
  ros__parameters:
    # 3x3 homography matrix (row-major) from calib_camera.py
    # Maps pixel (u, v) to ground-plane (x_cm, y_cm)
    # Replace these with your calibration output
    homography: [0.188513349, -0.01144, -0.016901, -0.09823, -0.015900, 0.0214948971, -0.0011998280, 0.003047542, 1.0]
    ground_plane_z: -84.0
    cluster_interval: 20
    dbscan_eps: 5.0
    dbscan_min_fraction: 0.8
